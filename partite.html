<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIBRO DELLE PARTITE · OVERTOP</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #04040b;
  --bg2:   #080810;
  --bg3:   #0c0c18;
  --bdr:   #14142a;
  --green: #00ff88;
  --red:   #ff2255;
  --gold:  #ffcc00;
  --blue:  #00d4ff;
  --dim:   #2a2a44;
  --muted: #555577;
  --txt:   #a0a0c0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--txt); font-family:'Share Tech Mono',monospace; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

.topbar { display:flex; align-items:center; gap:16px; padding:10px 20px; border-bottom:1px solid var(--bdr); background:var(--bg2); flex-shrink:0; }
.logo { font-family:'Orbitron',monospace; font-weight:900; font-size:.85rem; color:var(--gold); letter-spacing:4px; }
.logo span { display:block; font-size:.4rem; color:var(--muted); letter-spacing:5px; margin-top:1px; }
.live { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.mc-link { margin-left:auto; font-size:.6rem; color:var(--muted); text-decoration:none; letter-spacing:2px; padding:4px 10px; border:1px solid var(--dim); transition:.2s; }
.mc-link:hover { color:var(--blue); border-color:var(--blue); }
.clock { font-size:.65rem; color:var(--muted); }

.strip { display:flex; gap:0; border-bottom:1px solid var(--bdr); background:var(--bg2); flex-shrink:0; overflow-x:auto; }
.sv { padding:8px 16px; border-right:1px solid var(--bdr); display:flex; flex-direction:column; gap:2px; min-width:80px; }
.sv-l { font-size:.45rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
.sv-v { font-family:'Orbitron',monospace; font-size:.75rem; font-weight:700; }

.main { display:grid; grid-template-columns:1fr 380px; flex:1; overflow:hidden; }

.feed { overflow-y:auto; border-right:1px solid var(--bdr); }
.feed::-webkit-scrollbar { width:3px; }
.feed::-webkit-scrollbar-thumb { background:var(--bdr); }

.trade { padding:12px 18px; border-bottom:1px solid var(--bdr); cursor:pointer; position:relative; transition:background .15s; border-left:3px solid transparent; }
.trade:hover { background:var(--bg2); }
.trade.sel { background:var(--bg3); }
.trade.win { border-left-color:var(--green); }
.trade.loss { border-left-color:var(--red); }
.trade.fresh { animation:flash .4s 3; }
@keyframes flash { 0%,100%{background:var(--bg)} 50%{background:#1a1a00} }

.tr1 { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.t-time { font-size:.6rem; color:var(--muted); min-width:42px; }
.t-dir { font-family:'Orbitron',monospace; font-size:.55rem; font-weight:700; padding:1px 6px; border-radius:1px; }
.long  { background:rgba(0,255,136,.08); color:var(--green); border:1px solid rgba(0,255,136,.25); }
.short { background:rgba(255,34,85,.08);  color:var(--red);   border:1px solid rgba(255,34,85,.25); }
.t-ctx { flex:1; font-size:.68rem; }
.t-pnl { font-family:'Orbitron',monospace; font-size:.85rem; font-weight:700; }

.tr2 { display:flex; align-items:center; gap:6px; font-size:.58rem; color:var(--muted); }
.t-reason { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dots { display:flex; gap:3px; }
.dot { width:6px; height:6px; border-radius:50%; }
.dot.g { background:var(--green); box-shadow:0 0 4px var(--green); }
.dot.r { background:var(--red);   box-shadow:0 0 4px var(--red); }
.dot.b { background:var(--blue); }
.dot.gold { background:var(--gold); }

.panel { overflow-y:auto; }
.panel::-webkit-scrollbar { width:3px; }
.panel::-webkit-scrollbar-thumb { background:var(--bdr); }
.panel-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; gap:10px; color:var(--dim); font-size:.65rem; letter-spacing:3px; }

.ph { padding:14px 16px; border-bottom:1px solid var(--bdr); }
.ph-pnl { font-family:'Orbitron',monospace; font-size:1.5rem; font-weight:900; margin-bottom:3px; }
.ph-ctx { font-size:.72rem; color:var(--txt); margin-bottom:3px; }
.ph-meta { font-size:.58rem; color:var(--muted); }

.sec { padding:12px 16px; border-bottom:1px solid var(--bdr); }
.sec-t { font-size:.45rem; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }

.nb { padding:8px 10px; margin-bottom:6px; font-size:.68rem; line-height:1.7; border-left:2px solid var(--bdr); }
.nb.p { border-left-color:var(--red); }
.nb.l { border-left-color:var(--gold); }
.nb.a { border-left-color:var(--green); }
.nb.alt { border-left-color:var(--blue); background:rgba(0,212,255,.04); }
.nb-t { font-size:.5rem; letter-spacing:3px; margin-bottom:3px; }
.nb.p .nb-t { color:var(--red); }
.nb.l .nb-t { color:var(--gold); }
.nb.a .nb-t { color:var(--green); }
.nb.alt .nb-t { color:var(--blue); }

/* Capsule value card */
.cap-card { background:var(--bg3); border:1px solid var(--bdr); padding:10px 12px; margin-bottom:6px; }
.cap-card.green { border-color:rgba(0,255,136,.3); }
.cap-card.red   { border-color:rgba(255,34,85,.3); }
.cap-card.blue  { border-color:rgba(0,212,255,.3); }

.cap-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.cap-id { flex:1; font-size:.62rem; }
.cap-id.g { color:var(--green); }
.cap-id.r { color:var(--red); }
.cap-id.b { color:var(--blue); }

.badge { font-size:.5rem; padding:1px 6px; border-radius:1px; letter-spacing:1px; }
.b-pre { background:rgba(0,255,136,.1); color:var(--green); border:1px solid rgba(0,255,136,.3); }
.b-mis { background:rgba(255,34,85,.1); color:var(--red);   border:1px solid rgba(255,34,85,.3); }
.b-vin { background:rgba(0,212,255,.1); color:var(--blue);  border:1px solid rgba(0,212,255,.3); }
.b-gen { background:rgba(255,204,0,.1); color:var(--gold);  border:1px solid rgba(255,204,0,.3); }

.cap-stats { display:flex; gap:12px; font-size:.6rem; }
.cs { display:flex; flex-direction:column; gap:1px; }
.cs-l { font-size:.45rem; letter-spacing:2px; color:var(--muted); }
.cs-v { font-family:'Orbitron',monospace; font-size:.65rem; font-weight:700; }

/* Alternativa vincente */
.alt-card { background:rgba(0,212,255,.05); border:1px solid rgba(0,212,255,.2); padding:10px 12px; }
.alt-header { font-size:.5rem; letter-spacing:3px; color:var(--blue); margin-bottom:8px; }
.alt-pattern { font-family:'Orbitron',monospace; font-size:.8rem; font-weight:700; color:var(--green); margin-bottom:4px; }
.alt-stats { display:flex; gap:16px; font-size:.6rem; margin-bottom:6px; }
.alt-tip { font-size:.62rem; color:var(--txt); line-height:1.6; border-top:1px solid var(--bdr); padding-top:6px; margin-top:4px; }

.sbar { display:flex; flex-direction:column; gap:5px; }
.sr { display:flex; align-items:center; gap:8px; font-size:.62rem; }
.sr-l { min-width:50px; color:var(--muted); }
.sr-v { min-width:26px; text-align:right; font-size:.6rem; }
.trk { flex:1; height:3px; background:var(--dim); border-radius:2px; overflow:hidden; }
.fill { height:100%; border-radius:2px; }

.empty-msg { color:var(--muted); font-size:.62rem; padding:4px 0; }
.loading { text-align:center; padding:40px; color:var(--muted); font-size:.7rem; letter-spacing:3px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="live"></div>
  <div class="logo">LIBRO DELLE PARTITE <span>MEMORIA STORICA · OVERTOP BASSANO</span></div>
  <a href="/" class="mc-link">← MISSION CONTROL</a>
  <span class="clock" id="clk">—</span>
</div>

<div style="background:#06060f;border-bottom:1px solid var(--bdr);padding:10px 20px;flex-shrink:0;">
  <div style="font-size:.45rem;letter-spacing:4px;color:var(--muted);margin-bottom:7px;text-transform:uppercase;">MATURITÀ SISTEMA</div>
  <div id="maturity-rows" style="display:flex;flex-direction:column;gap:4px;"></div>
</div>

<div class="strip">
  <div class="sv"><span class="sv-l">REGIME</span><span class="sv-v" id="s-reg" style="color:var(--blue)">—</span></div>
  <div class="sv"><span class="sv-l">OI</span><span class="sv-v" id="s-oi">—</span></div>
  <div class="sv"><span class="sv-l">DIR</span><span class="sv-v" id="s-dir">—</span></div>
  <div class="sv"><span class="sv-l">SOGLIA</span><span class="sv-v" id="s-sog" style="color:var(--gold)">—</span></div>
  <div class="sv"><span class="sv-l">CONTESTO</span><span class="sv-v" id="s-ctx" style="font-size:.6rem">—</span></div>
  <div class="sv"><span class="sv-l">PARTITE</span><span class="sv-v" id="s-tot">—</span></div>
  <div class="sv"><span class="sv-l">WIN RATE</span><span class="sv-v" id="s-wr">—</span></div>
  <div class="sv"><span class="sv-l">PNL</span><span class="sv-v" id="s-pnl">—</span></div>
  <div class="sv"><span class="sv-l">CAPS AUTO</span><span class="sv-v" id="s-cap" style="color:var(--blue)">—</span></div>
</div>

<div class="main">
  <div class="feed" id="feed"><div class="loading">CARICAMENTO...</div></div>
  <div class="panel" id="panel">
    <div class="panel-empty"><span style="font-size:1.2rem;color:var(--bdr)">◁</span><span>SELEZIONA UNA PARTITA</span></div>
  </div>
</div>

<script>
const TOSSICI = [
  {m:'DEBOLE',v:'ALTA', t:'SIDEWAYS',wr:11, pnl:-3.29},
  {m:'DEBOLE',v:'BASSA',t:'SIDEWAYS',wr:35, pnl:-1.80},
  {m:'MEDIO', v:'ALTA', t:'SIDEWAYS',wr:28, pnl:-2.79},
  {m:'FORTE', v:'ALTA', t:'SIDEWAYS',wr:35, pnl:-2.00},
  {m:'DEBOLE',v:'ALTA', t:'DOWN',    wr:20, pnl:-2.50},
];
const VINCENTI = [
  {m:'FORTE',v:'BASSA',t:'UP',  wr:78, pnl:4.50},
  {m:'FORTE',v:'MEDIA',t:'UP',  wr:68, pnl:3.20},
  {m:'MEDIO',v:'BASSA',t:'UP',  wr:65, pnl:2.80},
  {m:'FORTE',v:'BASSA',t:'DOWN',wr:72, pnl:3.80, dir:'SHORT'},
  {m:'FORTE',v:'MEDIA',t:'DOWN',wr:65, pnl:3.00, dir:'SHORT'},
];

let CAPS=[], VERITAS=[], SEL=null, LAST_ID=null;

function ctx3(s){ const p=(s||'').split('|'); return {m:p[0]||'',v:p[1]||'',t:p[2]||''}; }

function getVeritasData(ctx_key){
  return VERITAS.find(v => v.ctx === ctx_key) || null;
}

function capsInfo(c, caps){
  const pre=[], mis=[];
  for(const p of TOSSICI){
    if(p.m!==c.m||p.v!==c.v||p.t!==c.t) continue;
    const found = caps.find(x=>{
      if(x.type!=='blocca_entry') return false;
      const tr=x.trigger||[];
      return tr.some(z=>z.param==='momentum'&&z.value===c.m)
          && tr.some(z=>z.param==='volatility'&&z.value===c.v)
          && tr.some(z=>z.param==='trend'&&z.value===c.t);
    });
    if(found) pre.push({cap:found, wr:p.wr, pnl_evitato:p.pnl});
    else      mis.push({pat:`${p.m}|${p.v}|${p.t}`, wr:p.wr, pnl_evitato:p.pnl});
  }
  const vin = VINCENTI.find(p=>p.m===c.m&&p.v===c.v&&p.t===c.t);
  // Alternativa vincente: qual è il pattern vincente più probabile dopo questo contesto
  const alt = VINCENTI[0]; // default: FORTE|BASSA|UP
  return {pre, mis, vin, alt};
}

function narratoreAlt(ctx, ci, veritas){
  // Suggerimento del trade alternativo vincente
  const alt = ci.alt;
  const vAlt = getVeritasData(`${alt.m}|${alt.v}|${alt.t}|${alt.dir||'LONG'}`);
  const wrAlt = vAlt ? Math.round(vAlt.wr*100) : alt.wr;
  const pnlAlt = vAlt ? vAlt.pnl_avg : alt.pnl;
  const nAlt = vAlt ? vAlt.n : '?';

  return {
    pattern: `${alt.m}|${alt.v}|${alt.t}`,
    dir: alt.dir || 'LONG',
    wr: wrAlt,
    pnl_medio: pnlAlt,
    campioni: nAlt,
    tip: `Invece di entrare in ${ctx.m}|${ctx.v}|${ctx.t} (perdita media $${Math.abs(ci.mis[0]?.pnl_evitato||2).toFixed(2)}), aspetta ${alt.m}|${alt.v}|${alt.t} — WR ${wrAlt}% su ${nAlt} trade reali, profitto medio +$${pnlAlt.toFixed(2)}.`
  };
}

function narr(trade, c, ci, veritas){
  const w=trade.pnl>0, r=trade.reason||'';
  const vCtx = getVeritasData(`${c.m}|${c.v}|${c.t}|${trade.dir||'LONG'}`);
  const wrReale = vCtx ? Math.round(vCtx.wr*100) : null;
  const pnlReale = vCtx ? vCtx.pnl_avg : null;

  let pe, le, az;
  if(!w){
    if(c.t==='SIDEWAYS')
      pe=`Contesto ${trade.ctx} — mercato laterale${wrReale!==null?` (WR reale ${wrReale}% su ${vCtx.n} trade)`:''}. Fee $2.00 impossibili da coprire con movimenti caotici.`;
    else if(r.includes('WIN_+0')||r.includes('WIN_+1'))
      pe=`Tick positivo ma insufficiente — profitto lordo < $2.00 fee. Perdita netta certa${pnlReale!==null?` (PnL medio storico ${pnlReale.toFixed(2)})`:''}.`;
    else if(r.includes('DIVORZIO')||r.includes('T1_')||r.includes('T4_'))
      pe=`Uscita forzata — condizioni cambiate durante il trade. Volatilità esplosa o fingerprint divergente.`;
    else
      pe=`Score ${trade.score} > soglia ${trade.soglia} ma contesto senza energia${wrReale!==null?` — WR reale ${wrReale}% su questo pattern`:''}. Fee non coperte.`;

    if(ci.mis.length>0){
      const m=ci.mis[0];
      le=`Pattern ${m.pat} tossico (WR ${m.wr}%) — capsule MANCANTE. Il sistema ha perso $${Math.abs(trade.pnl).toFixed(2)} che poteva evitare.`;
      az=`Capsule ${m.pat} in generazione → questa perdita non si ripeterà. Risparmio atteso: $${Math.abs(m.pnl_evitato).toFixed(2)} per trade.`;
    } else if(ci.pre.length>0){
      const cap = ci.pre[0].cap;
      const salvati = cap.hits_saved||0;
      le=`Capsule ${cap.id} attiva — ${cap.hits||0} blocchi totali, ${salvati} perdite evitate${cap.pnl_avg?`, PnL medio salvato: $${Math.abs(cap.pnl_avg).toFixed(2)}`:''}. Bypassata in EXPLOSIVE.`;
      az=`Phantom misura il bypass → se WR > 45% estende la capsule a tutti i regimi automaticamente.`;
    } else {
      le=`Pattern non ancora catalogato nel sistema.`;
      az=`Oracle genererà la capsule appropriata dopo analisi del contesto.`;
    }
  } else {
    pe=`Contesto ${trade.ctx}${wrReale!==null?` — WR reale ${wrReale}% (${vCtx.n} trade)`:''}. Movimento sufficiente a coprire fee con profitto netto.`;
    le=ci.vin ? `Pattern vincente confermato — WR ${ci.vin.wr}%, PnL medio +$${ci.vin.pnl.toFixed(2)}. Nessun blocco necessario.`
              : `Trade corretto. Il sistema ha selezionato il contesto giusto.`;
    az=`Phantom registra la vittoria. Questo pattern viene rinforzato nella memoria del sistema.`;
  }
  return {pe,le,az};
}

function renderPanel(t){
  if(!t){ document.getElementById('panel').innerHTML='<div class="panel-empty"><span style="font-size:1.2rem;color:var(--bdr)">◁</span><span>SELEZIONA UNA PARTITA</span></div>'; return; }
  const w=t.pnl>0, c=ctx3(t.ctx), ci=capsInfo(c,CAPS), n=narr(t,c,ci,VERITAS);
  const ora=(t.ts||'').split(' ')[1]?.substr(0,5)||'—';
  const sw=Math.min(100,t.score||0), tgw=Math.min(100,t.soglia||0);
  const altInfo = !w && ci.mis.length>0 ? narratoreAlt(c, ci, VERITAS) : null;

  // Sezione capsule con valore
  let capseHTML = '';
  if(ci.pre.length>0){
    ci.pre.forEach(x=>{
      const cap=x.cap;
      const hits=cap.hits||0, saved=cap.hits_saved||0;
      const salvato_tot = saved * Math.abs(x.pnl_evitato);
      capseHTML+=`<div class="cap-card green">
        <div class="cap-top"><span class="cap-id g">${cap.id}</span><span class="badge b-pre">ATTIVA</span></div>
        <div class="cap-stats">
          <div class="cs"><span class="cs-l">BLOCCHI</span><span class="cs-v" style="color:var(--blue)">${hits}</span></div>
          <div class="cs"><span class="cs-l">PERDITE EVITATE</span><span class="cs-v" style="color:var(--green)">${saved}</span></div>
          <div class="cs"><span class="cs-l">WR STORICO</span><span class="cs-v" style="color:var(--gold)">${x.wr}%</span></div>
          <div class="cs"><span class="cs-l">RISPARMIO</span><span class="cs-v" style="color:var(--green)">$${salvato_tot.toFixed(0)}</span></div>
        </div>
      </div>`;
    });
  }
  if(ci.mis.length>0){
    ci.mis.forEach(m=>{
      capseHTML+=`<div class="cap-card red">
        <div class="cap-top"><span class="cap-id r">${m.pat}</span><span class="badge b-mis">MANCANTE</span></div>
        <div class="cap-stats">
          <div class="cs"><span class="cs-l">WR STORICO</span><span class="cs-v" style="color:var(--red)">${m.wr}%</span></div>
          <div class="cs"><span class="cs-l">PERDITA MEDIA</span><span class="cs-v" style="color:var(--red)">$${Math.abs(m.pnl_evitato).toFixed(2)}</span></div>
          <div class="cs"><span class="cs-l">STATO</span><span class="cs-v" style="color:var(--gold);font-size:.55rem">IN CREAZIONE</span></div>
        </div>
      </div>`;
    });
  }
  if(ci.vin){
    capseHTML+=`<div class="cap-card blue">
      <div class="cap-top"><span class="cap-id b">${ci.vin.m}|${ci.vin.v}|${ci.vin.t}</span><span class="badge b-vin">VINCENTE</span></div>
      <div class="cap-stats">
        <div class="cs"><span class="cs-l">WR</span><span class="cs-v" style="color:var(--green)">${ci.vin.wr}%</span></div>
        <div class="cs"><span class="cs-l">PNL MEDIO</span><span class="cs-v" style="color:var(--green)">+$${ci.vin.pnl.toFixed(2)}</span></div>
      </div>
    </div>`;
  }
  if(!capseHTML) capseHTML='<span class="empty-msg">Pattern neutro — nessuna capsule specifica</span>';

  // Alternativa vincente
  let altHTML = '';
  if(altInfo){
    altHTML=`<div class="sec">
      <div class="sec-t">TRADE ALTERNATIVO VINCENTE</div>
      <div class="alt-card">
        <div class="alt-header">▶ INVECE DI PERDERE — ASPETTA QUESTO</div>
        <div class="alt-pattern">${altInfo.pattern} <span style="font-size:.6rem;color:var(--txt)">${altInfo.dir}</span></div>
        <div class="alt-stats">
          <div class="cs"><span class="cs-l">WIN RATE</span><span class="cs-v" style="color:var(--green)">${altInfo.wr}%</span></div>
          <div class="cs"><span class="cs-l">PNL MEDIO</span><span class="cs-v" style="color:var(--green)">+$${altInfo.pnl_medio.toFixed(2)}</span></div>
          <div class="cs"><span class="cs-l">CAMPIONI</span><span class="cs-v" style="color:var(--blue)">${altInfo.campioni}</span></div>
        </div>
        <div class="alt-tip">${altInfo.tip}</div>
      </div>
    </div>`;
  }

  document.getElementById('panel').innerHTML=`
    <div class="ph" style="border-left:4px solid ${w?'var(--green)':'var(--red)'}">
      <div class="ph-pnl" style="color:${w?'var(--green)':'var(--red)'}">${t.pnl>=0?'+':''}$${t.pnl.toFixed(2)}</div>
      <div class="ph-ctx">${t.ctx||'—'} · ${t.dir||'LONG'}</div>
      <div class="ph-meta">${ora} · score ${t.score} / soglia ${t.soglia} · id #${t.id}</div>
    </div>
    <div class="sec">
      <div class="sec-t">NARRAZIONE</div>
      <div class="nb p"><div class="nb-t">⚠ PERCHÉ ${w?'ABBIAMO VINTO':'ABBIAMO PERSO'}</div>${n.pe}</div>
      <div class="nb l"><div class="nb-t">◆ LEZIONE</div>${n.le}</div>
      <div class="nb a"><div class="nb-t">${w?'✓ CONFERMA':'💊 AZIONE SISTEMA'}</div>${n.az}</div>
    </div>
    <div class="sec">
      <div class="sec-t">CAPSULE — VALORE E STATO</div>
      ${capseHTML}
    </div>
    ${altHTML}
    <div class="sec">
      <div class="sec-t">SCORE / SOGLIA</div>
      <div class="sbar">
        <div class="sr"><span class="sr-l">SCORE</span><div class="trk"><div class="fill" style="width:${sw}%;background:${w?'var(--green)':'var(--red)'}"></div></div><span class="sr-v">${t.score}</span></div>
        <div class="sr"><span class="sr-l">SOGLIA</span><div class="trk"><div class="fill" style="width:${tgw}%;background:var(--muted)"></div></div><span class="sr-v">${t.soglia}</span></div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-t">MOTIVO USCITA</div>
      <div style="font-size:.68rem;padding:4px 0">${t.reason||'—'}</div>
    </div>`;
}

function renderFeed(trades){
  if(!trades||!trades.length){ document.getElementById('feed').innerHTML='<div class="loading">Nessuna partita</div>'; return; }
  document.getElementById('feed').innerHTML = trades.map(t=>{
    const w=t.pnl>0, c=ctx3(t.ctx), ci=capsInfo(c,CAPS);
    const ora=(t.ts||'').split(' ')[1]?.substr(0,5)||'—';
    const fresh=t.id===LAST_ID;
    return `<div class="trade ${w?'win':'loss'}${SEL===t.id?' sel':''}${fresh?' fresh':''}" onclick='pick(${JSON.stringify(t)})'>
      <div class="tr1">
        <span class="t-time">${ora}</span>
        <span class="t-dir ${(t.dir||'').toUpperCase()==='SHORT'?'short':'long'}">${t.dir||'LONG'}</span>
        <span class="t-ctx">${t.ctx||'—'}</span>
        <span class="t-pnl" style="color:${w?'var(--green)':'var(--red)'}">${t.pnl>=0?'+':''}$${t.pnl.toFixed(2)}</span>
      </div>
      <div class="tr2">
        <span class="t-reason">${(t.reason||'').substr(0,35)}</span>
        <div class="dots">
          ${ci.pre.length?'<span class="dot g" title="capsule attiva"></span>':''}
          ${ci.mis.length?'<span class="dot r" title="capsule mancante"></span>':''}
          ${ci.vin?'<span class="dot b" title="pattern vincente"></span>':''}
          ${!ci.pre.length&&!ci.mis.length&&!ci.vin?'<span class="dot gold" title="neutro"></span>':''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function pick(t){ SEL=t.id; window._trades=window._trades||[]; renderFeed(window._trades); renderPanel(t); }

async function load(){
  try {
    const d=await fetch('/debug/snapshot').then(r=>r.json());
    CAPS=d.capsule_attive||[];
    VERITAS=d.veritas||[];
    const trades=d.ultimi_trade||[];
    window._trades=trades;
    const st=d.stats_post483||{};

    document.getElementById('clk').textContent=new Date().toLocaleTimeString('it-IT');
    document.getElementById('s-reg').textContent=d.regime||'—';
    document.getElementById('s-reg').style.color=d.regime==='EXPLOSIVE'?'var(--green)':d.regime==='RANGING'?'var(--gold)':'var(--blue)';
    document.getElementById('s-oi').textContent=`${d.oi_stato||'—'} ${(d.oi_carica||0).toFixed(2)}`;
    document.getElementById('s-oi').style.color=d.oi_stato==='FUOCO'?'var(--green)':d.oi_stato==='CARICA'?'var(--gold)':'var(--muted)';
    document.getElementById('s-dir').textContent=d.direction||'—';
    document.getElementById('s-dir').style.color=d.direction==='LONG'?'var(--green)':'var(--red)';
    document.getElementById('s-sog').textContent=d.soglia||'—';
    document.getElementById('s-ctx').textContent=d.last_context||'—';
    document.getElementById('s-tot').textContent=st.count||0;
    const wr=st.count>0?Math.round((st.wins||0)/st.count*100):0;
    document.getElementById('s-wr').textContent=wr+'%';
    document.getElementById('s-wr').style.color=wr>=50?'var(--green)':wr>=30?'var(--gold)':'var(--red)';
    const pnl=st.pnl||0;
    document.getElementById('s-pnl').textContent=(pnl>=0?'+':'')+'$'+pnl.toFixed(2);
    document.getElementById('s-pnl').style.color=pnl>=0?'var(--green)':'var(--red)';
    document.getElementById('s-cap').textContent=CAPS.filter(x=>x.livello==='AUTO').length;

    if(trades.length&&trades[0].id!==LAST_ID){ LAST_ID=trades[0].id; }

    renderFeed(trades);
    if(!SEL&&trades.length){ SEL=trades[0].id; renderPanel(trades[0]); }
    else if(SEL){ const s=trades.find(x=>x.id===SEL); if(s) renderPanel(s); }
    renderMaturity(d);
  } catch(e){ console.error(e); }
}

load();
setInterval(load,5000);

function renderMaturity(snap) {
  const st = snap.stats_post483 || {};
  const veritas = snap.veritas || [];
  const caps = snap.capsule_attive || [];
  const trades = st.count || 0;
  const wins = st.wins || 0;

  // Calcola metriche reali
  const fondazione = Math.min(100, Math.round(
    (trades > 0 ? 40 : 0) +
    (caps.filter(c=>c.livello==='AUTO').length > 0 ? 20 : 0) +
    (caps.filter(c=>c.livello==='LEARNED').length > 0 ? 20 : 0) +
    (snap.last_context !== '?' ? 20 : 0)
  ));

  // Memoria: quanti contesti diversi ha visto con n>5
  const ctxDiversi = veritas.filter(v => v.n >= 5).length;
  const memoria = Math.min(100, Math.round(ctxDiversi * 12 + (trades >= 100 ? 20 : trades / 5)));

  // Precisione: WR reale sui trade
  const wr = trades > 0 ? Math.round(wins / trades * 100) : 0;
  const precisione = Math.min(100, Math.round(
    (wr >= 50 ? 60 : wr >= 30 ? 30 : wr >= 10 ? 15 : 0) +
    (caps.filter(c=>c.samples >= 20).length * 5) +
    (veritas.filter(v=>v.wr >= 0.5).length * 10)
  ));

  // Perfezione: sistema completo e profittevole
  const pnl = st.pnl || 0;
  const perfezione = Math.min(100, Math.round(
    (pnl > 0 ? 40 : 0) +
    (wr >= 55 ? 30 : wr >= 45 ? 15 : 0) +
    (trades >= 500 ? 30 : trades / 20)
  ));

  const rows = [
    {label:'Fondazione', pct:fondazione, note:'architettura, capsule, formato', col:'#00d4ff'},
    {label:'Memoria',    pct:memoria,    note:'serve mercato vario · ' + ctxDiversi + ' contesti visti', col:'#ffcc00'},
    {label:'Precisione', pct:precisione, note:'serve tempo e trade · WR ' + wr + '%', col:'#ff8800'},
    {label:'Perfezione', pct:perfezione, note:'sistema profittevole stabile', col:'#00ff88'},
  ];

  const el = document.getElementById('maturity-rows');
  if (!el) return;
  el.innerHTML = rows.map(r => {
    const filled = Math.round(r.pct / 10);
    const empty = 10 - filled;
    const blocks = '█'.repeat(filled) + '░'.repeat(empty);
    return `<div style="display:flex;align-items:center;gap:10px;font-size:.65rem;">
      <span style="min-width:70px;color:var(--muted);font-size:.55rem;letter-spacing:2px;">${r.label.toUpperCase()}</span>
      <span style="color:${r.col};letter-spacing:1px;font-family:'Share Tech Mono',monospace">${blocks}</span>
      <span style="color:${r.col};font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;min-width:36px">${r.pct}%</span>
      <span style="color:var(--dim);font-size:.55rem;">← ${r.note}</span>
    </div>`;
  }).join('');
}
</script>
